name: LMS Watcher

on:
  workflow_dispatch:
    inputs:
      source:
        description: Trigger source used to select verification steps
        required: false
        default: manual
        type: string
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: lms-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show run context
        run: |
          echo "Workflow SHA: $GITHUB_SHA"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Dispatch source: ${{ inputs.source || 'none' }}"
          echo "Checked out commit:"
          git rev-parse HEAD

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify configuration
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.source != 'cloudflare-cron') }}
        run: pnpm verify:config
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}
      - name: Verify Cloudflare KV
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.source != 'cloudflare-cron') }}
        run: pnpm verify:kv
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}

      - name: Verify calendar feed
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.source != 'cloudflare-cron') }}
        run: pnpm verify:calendar
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}

      - name: Verify Moodle crawl
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.source != 'cloudflare-cron') }}
        run: pnpm verify:moodle
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}

      - name: Run LMS watcher
        run: pnpm watch
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}
          TELEGRAM_SCREENSHOTS: ${{ secrets.TELEGRAM_SCREENSHOTS }}
          MAX_SCREENSHOTS_PER_RUN: ${{ secrets.MAX_SCREENSHOTS_PER_RUN }}
          SCAN_GAP_WARN_MINUTES: ${{ secrets.SCAN_GAP_WARN_MINUTES }}
          STATUS_NOTIFICATION_HOURS: ${{ secrets.STATUS_NOTIFICATION_HOURS }}

      - name: Notify deployment success
        if: success() && github.event_name == 'push'
        run: pnpm notify:deploy
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}
