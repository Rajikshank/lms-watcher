name: LMS Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

concurrency:
  group: lms-watcher
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run LMS watcher
        run: pnpm watch
        env:
          LMS_BASE_URL: ${{ secrets.LMS_BASE_URL }}
          LMS_USERNAME: ${{ secrets.LMS_USERNAME }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          MOODLE_CALENDAR_URL: ${{ secrets.MOODLE_CALENDAR_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          WATCHED_COURSE_IDS: ${{ secrets.WATCHED_COURSE_IDS }}
          WATCHED_COURSE_NAMES: ${{ secrets.WATCHED_COURSE_NAMES }}
          CALENDAR_FILTER_MODE: ${{ secrets.CALENDAR_FILTER_MODE }}
          NOTIFY_REMOVED_ITEMS: ${{ secrets.NOTIFY_REMOVED_ITEMS }}
